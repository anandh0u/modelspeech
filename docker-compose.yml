version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: emomemory_postgres
    environment:
      POSTGRES_USER: emomemory
      POSTGRES_PASSWORD: emomemory_password
      POSTGRES_DB: emomemory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emomemory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: emomemory_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emomemory_api
    environment:
      - DATABASE_URL=postgresql://emomemory:emomemory_password@postgres:5432/emomemory
      - REDIS_URL=redis://redis:6379
      - COGNEE_API_KEY=${COGNEE_API_KEY}
      - COGNEE_USE_CLOUD=${COGNEE_USE_CLOUD:-true}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # Gradio Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: emomemory_frontend
    environment:
      - API_BASE_URL=http://api:8000/api
    ports:
      - "7860:7860"
    depends_on:
      - api
    command: python frontend_app.py
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: emomemory_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
